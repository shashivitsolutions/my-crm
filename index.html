<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shashiv IT CRM - Cloud Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#07090f;--bg2:#0e1117;--bg3:#141820;--bg4:#1a2030;--bg5:#212840;
  --border:#1e2535;--border2:#28324a;
  --blue:#4f7dff;--blue2:#3460e0;--blue3:#7fa3ff;
  --orange:#ff6b35;--orange2:#e05520;
  --green:#22d47e;--green2:#15a85f;
  --red:#f55151;--yellow:#f5c842;--purple:#a56fff;--teal:#20d4c8;
  --text:#e8edf8;--text2:#8b9abf;--text3:#525e7a;
  --card:#0e1117;--radius:12px;--radius-sm:8px;--radius-xs:6px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --font-head:'Syne',system-ui,sans-serif;
  --shadow:0 8px 32px rgba(0,0,0,.5);
  --sidebar-w:230px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:var(--blue);text-decoration:none}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* ── LOGIN ── */
.login-screen{
  height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden;
}
.login-screen::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 700px 500px at 15% 50%,rgba(79,125,255,.07) 0%,transparent 70%),
    radial-gradient(ellipse 500px 700px at 85% 20%,rgba(255,107,53,.05) 0%,transparent 70%),
    radial-gradient(ellipse 400px 400px at 60% 80%,rgba(165,111,255,.04) 0%,transparent 70%);
}
.login-card{
  width:400px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:18px;padding:40px 36px;box-shadow:var(--shadow);position:relative;z-index:1;
}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.logo-icon{
  width:42px;height:42px;background:linear-gradient(135deg,var(--blue),var(--orange));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-weight:800;font-size:18px;color:#fff;flex-shrink:0;
}
.login-brand{font-family:var(--font-head);font-size:17px;font-weight:700;color:var(--text)}
.login-subtitle{font-size:11.5px;color:var(--text3);margin-top:3px}
.login-error{
  background:rgba(245,81,81,.08);border:1px solid rgba(245,81,81,.25);
  color:#f87171;border-radius:var(--radius-sm);padding:9px 13px;font-size:13px;margin-top:12px;
}
/* ── APP LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);
  border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;
}
.logo-area{
  padding:20px 16px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:11px;flex-shrink:0;
}
.logo-text{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3)}
.nav{flex:1;padding:8px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nav-section{
  font-size:9.5px;color:var(--text3);font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:10px 8px 4px;margin-top:2px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);
  cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;
  user-select:none;border:1px solid transparent;position:relative;
}
.nav-item:hover{background:var(--bg4);color:var(--text)}
.nav-item.active{
  background:linear-gradient(135deg,rgba(79,125,255,.14),rgba(255,107,53,.07));
  color:var(--blue3);border-color:rgba(79,125,255,.2);
}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--orange);color:#fff;
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;
  min-width:20px;text-align:center;
}
.nav-badge.green{background:var(--green2)}
.sidebar-footer{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.user-card{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:var(--radius-sm);background:var(--bg3);
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-name{font-size:12.5px;font-weight:600;color:var(--text)}
.user-role{font-size:10px;color:var(--text3)}
.logout-btn{
  margin-left:auto;width:26px;height:26px;border-radius:6px;
  border:1px solid var(--border);background:transparent;color:var(--text3);
  display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;
}
.logout-btn:hover{background:rgba(245,81,81,.1);color:var(--red);border-color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  height:56px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0;
}
.page-title{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text)}
.breadcrumb{font-size:11.5px;color:var(--text3);margin-top:1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px}
.btn{
  height:34px;padding:0 16px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);background:transparent;color:var(--text2);
  font-size:13px;font-weight:500;transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:var(--blue2)}
.btn.orange{background:var(--orange);border-color:var(--orange);color:#fff}
.btn.orange:hover{background:var(--orange2)}
.btn.danger{border-color:rgba(245,81,81,.4);color:var(--red)}
.btn.danger:hover{background:rgba(245,81,81,.1)}
.btn.full{width:100%;justify-content:center;height:42px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.tb-btn{
  height:32px;padding:0 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);background:transparent;color:var(--text2);
  font-size:12.5px;transition:all .15s;
  display:inline-flex;align-items:center;gap:5px;
}
.tb-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--blue)}
.tb-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.tb-btn.primary:hover{background:var(--blue2)}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:600;color:var(--text2)}
.form-input,.form-select,.form-textarea{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-size:13.5px;padding:9px 12px;outline:none;transition:border .15s;
  width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);background:var(--bg4)}
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;
}
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.stat-card.blue::before{background:var(--blue);content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-num{font-family:var(--font-head);font-size:26px;font-weight:800;color:var(--text);margin:4px 0 2px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase}
tbody tr{border-bottom:1px solid var(--border)}
td{padding:11px 12px;color:var(--text2)}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(3px);
}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;
}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:12px 18px;display:flex;align-items:center;gap:10px;
  font-size:13.5px;color:var(--text);box-shadow:var(--shadow);
  transform:translateY(80px);opacity:0;transition:all .3s ease;z-index:2000;
}
.toast.show{transform:translateY(0);opacity:1}
.loading-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;
  display:flex;align-items:center;justify-content:center;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card" id="panel-login">
    <div class="login-logo">
      <div class="logo-icon">S</div>
      <div>
        <div class="login-brand">Shashiv IT Solutions</div>
        <div class="login-subtitle">Cloud Service Management</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Employee ID</label>
      <input class="form-input" id="login-user" type="text" placeholder="123456" />
    </div>
    <div class="form-group" style="margin-top:12px">
      <label class="form-label">Password</label>
      <input class="form-input" id="login-pass" type="password" placeholder="00000000" />
    </div>
    <div id="login-error" class="login-error" style="display:none"></div>
    <button class="btn primary full" id="login-btn" onclick="doLogin()" style="margin-top:20px">Sign In</button>
  </div>
</div>

<div id="app" class="app" style="display:none">
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon">S</div>
      <div>
        <div class="logo-text">Shashiv IT</div>
        <div class="logo-sub">Cloud Sync Active</div>
      </div>
    </div>
    <nav class="nav" id="sidebar-nav">
      <div class="nav-section">Main</div>
      <div class="nav-item active" onclick="showDashboard()"><span class="nav-icon">⊟</span> Dashboard</div>
      <div class="nav-item" onclick="showCustomers()"><span class="nav-icon">👥</span> Customers</div>
      <div class="nav-item" onclick="showJobs()"><span class="nav-icon">🔧</span> Active Work</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">AD</div>
        <div>
          <div class="user-name">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
        <button class="logout-btn" onclick="doLogout()">→</button>
      </div>
    </div>
  </aside>
  
  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-title" id="topbar-title">Dashboard</div>
        <div class="breadcrumb" id="topbar-sub">Overview & Analytics</div>
      </div>
      <div class="topbar-right">
        <button class="tb-btn primary" onclick="openAddModal()">+ Add New</button>
      </div>
    </header>
    <main class="content" id="page-content">
       </main>
  </div>
</div>

<div class="modal-overlay" id="global-modal" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title-text">Add Item</div>
      <button onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast">✓ Action Completed</div>
<div class="loading-overlay" id="loading" style="display:none"><div class="spinner"></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCmlp8tIIfwPV_os8gUPFfYpxEDSW_cGCM",
    authDomain: "mycrm-f0774.firebaseapp.com",
    databaseURL: "https://mycrm-f0774-default-rtdb.firebaseio.com",
    projectId: "mycrm-f0774",
    storageBucket: "mycrm-f0774.firebasestorage.app",
    messagingSenderId: "776907629542",
    appId: "1:776907629542:web:cd04fe82e5e7b89066ac27",
    measurementId: "G-YVH2SGHT1E"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // ═══════════════════════════════════════════════════════════════════════
  // CLOUD DATA STORE
  // ═══════════════════════════════════════════════════════════════════════
  window.DB = {
    allData: {},
    
    async init() {
      const dbRef = ref(database);
      const snapshot = await get(child(dbRef, 'crm_data'));
      this.allData = snapshot.exists() ? snapshot.val() : {};
    },

    get(key) { return this.allData[key] || null; },
    
    getList(key) {
      const data = this.get(key);
      return data ? Object.values(data) : [];
    },

    set(key, val) {
      this.allData[key] = val;
      set(ref(database, `crm_data/${key}`), val);
      localStorage.setItem('crm_bkp_'+key, JSON.stringify(val));
    },

    push(key, item) {
      if(!item.id) item.id = 'ID-' + Date.now();
      const current = this.get(key) || {};
      current[item.id] = item;
      this.set(key, current);
      return item.id;
    }
  };

  // ═══════════════════════════════════════════════════════════════════════
  // SYSTEM FUNCTIONS
  // ═══════════════════════════════════════════════════════════════════════
  window.doLogin = function() {
    const id = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    if(id === '123456' && pass === '00000000') {
      sessionStorage.setItem('crm_session', 'active');
      location.reload();
    } else {
      alert("Invalid login!");
    }
  };

  window.doLogout = function() {
    sessionStorage.removeItem('crm_session');
    location.reload();
  };

  window.showDashboard = function() {
    document.getElementById('topbar-title').innerText = "Dashboard";
    const customers = window.DB.getList('customers').length;
    const jobs = window.DB.getList('jobs').length;
    
    document.getElementById('page-content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card blue"><div class="stat-num">${customers}</div><div>Total Customers</div></div>
        <div class="stat-card blue"><div class="stat-num">${jobs}</div><div>Active Jobs</div></div>
      </div>
    `;
  };

  window.showCustomers = function() {
    document.getElementById('topbar-title').innerText = "Customers";
    const list = window.DB.getList('customers');
    let rows = list.map(c => `<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.address}</td></tr>`).join('');
    
    document.getElementById('page-content').innerHTML = `
      <div class="card">
        <table>
          <thead><tr><th>Name</th><th>Phone</th><th>Address</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="3">No customers found.</td></tr>'}</tbody>
        </table>
      </div>
    `;
  };

  window.openAddModal = function() {
    document.getElementById('global-modal').style.display = 'flex';
    document.getElementById('modal-body').innerHTML = `
      <div class="form-group">
        <label class="form-label">Customer Name</label>
        <input id="new-c-name" class="form-input" />
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="form-label">Phone Number</label>
        <input id="new-c-phone" class="form-input" />
      </div>
      <button class="btn primary full" style="margin-top:20px" onclick="saveNewCustomer()">Save Customer</button>
    `;
  };

  window.saveNewCustomer = function() {
    const name = document.getElementById('new-c-name').value;
    const phone = document.getElementById('new-c-phone').value;
    if(!name) return alert("Name required");
    
    window.DB.push('customers', { name, phone, address: 'Cloud Entry' });
    closeModal();
    showCustomers();
    showToast();
  };

  window.closeModal = function() { document.getElementById('global-modal').style.display = 'none'; };
  
  window.showToast = function() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };

  // ═══════════════════════════════════════════════════════════════════════
  // STARTUP
  // ═══════════════════════════════════════════════════════════════════════
  async function init() {
    await window.DB.init();
    if(sessionStorage.getItem('crm_session')) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      showDashboard();
    }
  }

  init();
</script>
</body>
</html>
